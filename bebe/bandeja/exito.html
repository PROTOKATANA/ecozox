<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="brand/theme.css">

    <script>
        window.ECOZOX_BRAND = {
            nombre:      'BabyNest',
            email:       'hola@babynest.com',
            homeUrl:     'index.html',
            carritoUrl:  'carrito.html',
            nicho:       'bandeja',
            localesPath: 'locales/'
        };
        window.ECOZOX_API_URL = 'http://localhost:3000';
    </script>

    <script src="../../components/header.js" defer></script>
    <script src="../../components/bottom-nav.js" defer></script>

    <style>
        .success-section {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .success-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }
        .success-icon {
            width: 72px;
            height: 72px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .success-icon svg {
            width: 36px;
            height: 36px;
            color: #16a34a;
        }
        .success-card h1 {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            color: var(--text-main);
            margin-bottom: 0.75rem;
        }
        .success-card p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        .success-session {
            margin: 1.5rem 0;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.875rem 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            word-break: break-all;
        }
        .success-session span {
            font-weight: 600;
            color: var(--text-main);
        }
        .success-actions {
            margin-top: 2rem;
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .success-actions a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: var(--font-heading);
            font-size: 0.875rem;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
        }
        .btn-home {
            background: var(--primary-color);
            color: #fff;
        }
        .btn-home:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="page-success">

    <div data-component="header" data-base="../../"></div>

    <main class="success-section">
        <div class="container">
            <div class="success-card">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h1>¡Pedido Confirmado!</h1>
                <p>Gracias por tu compra. Hemos recibido tu pedido y lo estamos procesando.</p>
                <p>Recibirás un correo de confirmación en breve.</p>
                <div class="success-session" id="sessionInfo" style="display:none">
                    Referencia: <span id="sessionId"></span>
                </div>
                <div class="success-actions">
                    <a href="index.html" class="btn-home">Volver a la tienda</a>
                </div>
            </div>
        </div>
    </main>

    <div data-component="footer" data-base="../../" data-pages-base="../../pages/"></div>
    <div data-component="bottom-nav" data-base="../../"></div>

    <script src="../../components/footer.js" defer></script>
    <script src="../../js/i18n.js" defer></script>
    <script src="../../app.js" defer></script>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var sid = params.get('session_id');
            if (sid) {
                document.getElementById('sessionId').textContent = sid;
                document.getElementById('sessionInfo').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
