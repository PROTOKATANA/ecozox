<!DOCTYPE html>
<html lang="es" data-i18n-title="title_home">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoZox - Tienda Minimalista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        window.ECOZOX_API_URL = 'https://api-6tn32nl4ea-uc.a.run.app';
        window.ECOZOX_BRAND = { localesPath: 'gatos/caton/locales/' };
    </script>
    <script src="components/header.js" defer></script>
    <script src="components/bottom-nav.js" defer></script>
    <script src="components/footer.js" defer></script>
    <link rel="preload" as="image" href="gatos/caton/pixel/t2.jpg">
    <script src="js/i18n.js" defer></script>
</head>
<body class="page-home">

    <div data-component="header" data-base=""></div>

    <section class="hero">
        <div class="container">
            <h1 data-i18n="hero_title">Colección Esencial 2026</h1>
            <p data-i18n="hero_subtitle">Descubre nuestra nueva línea de productos minimalistas diseñados para el día a día. Simplicidad, funcionalidad y elegancia.</p>
        </div>
    </section>

    <!-- Separador de Onda Dinámico -->
    <div class="line-divider"
         data-wave-width="56"
         data-wave-height="23"
         data-stroke-width="12"
         data-stroke-color="#e5e7eb"
          data-fill-top="#ffffff"
          data-fill-bottom="#f7f4f0">
    </div>

    <main class="catalog-section">
        <div class="container">
            <div class="product-grid">
                <a href="gatos/caton/index.html" class="product-card">
                    <div class="product-img-wrapper">
                        <img src="gatos/caton/pixel/t2.jpg" alt="Cama rascadora para gatos de madera de pino" class="product-image" loading="eager">
                    </div>
                    <div class="product-info">
                        <h2 class="product-title"><span class="product-title__text" data-i18n="product_title">Cama rascadora para gatos de madera de pino</span></h2>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <div data-component="footer" data-base="" data-pages-base="pages/"></div>
    <div data-component="bottom-nav" data-base="" data-first-article="gatos/caton/index.html"></div>

    <script src="app.js" defer></script>
</body>
</html>
