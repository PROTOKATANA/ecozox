<!DOCTYPE html>
<html lang="es" data-i18n-title="title_cart">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - EcoZox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="components/header.js" defer></script>
</head>
<body>

    <div data-component="header" data-base=""></div>

    <main class="cart-section">
        <div class="container">
            <h1 style="margin-bottom: 2rem;" data-i18n="cart_title">Tu Carrito de Compra</h1>

            <div class="cart-layout">
                <div class="cart-items"></div>

                <div class="cart-summary">
                    <h2 data-i18n="cart_summary_title">Resumen del Pedido</h2>
                    <div class="summary-body" style="margin-top: 1.5rem;">
                        <div class="summary-row">
                            <span data-i18n="cart_subtotal">Subtotal</span>
                            <span>$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span data-i18n="cart_shipping">Envío</span>
                            <span data-i18n="cart_shipping_free">Gratis</span>
                        </div>
                        <div class="summary-row">
                            <span data-i18n="cart_tax">Impuestos estimados</span>
                            <span>$0.00</span>
                        </div>
                        <div class="summary-total">
                            <span data-i18n="cart_total">Total</span>
                            <span>$0.00</span>
                        </div>
                    </div>
					<button class="btn btn-primary checkout-btn" data-i18n="cart_checkout">Proceder al pago</button>
                </div>
            </div>
        </div>
    </main>

    <div data-component="footer" data-base="" data-pages-base="pages/"></div>

    <script src="components/footer.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
