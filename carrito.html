<!DOCTYPE html>
<html lang="es" data-i18n-title="title_cart">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - EcoZox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/shipping-widget.css">
    <script>
        window.ECOZOX_BRAND = window.ECOZOX_BRAND || { carritoUrl: '/carrito.html' };
        (function () {
            try {
                var p = localStorage.getItem('ecozox_nicho_locales');
                if (p) window.ECOZOX_BRAND.localesPath = p;
            } catch (e) {}
        }());
    </script>
    <script src="components/header.js" defer></script>
    <script src="components/bottom-nav.js" defer></script>
</head>
<body class="page-cart">

    <div data-component="header" data-base=""></div>

    <main class="cart-section">
        <div class="container">
            <div class="cart-layout">
                <div class="cart-items"></div>

                <div class="cart-sidebar">

                <div class="shipping-info-card" aria-label="Información de envío">

                    <!-- Capa 1: Cabecera — icono camión + título + badge -->
                    <div class="sic__header">
                        <svg class="sic__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="1" y="3" width="15" height="13" rx="1"/>
                            <path d="M16 8h4l3 5v4h-7V8z"/>
                            <circle cx="5.5" cy="18.5" r="2.5"/>
                            <circle cx="18.5" cy="18.5" r="2.5"/>
                        </svg>
                        <span class="sic__title" data-i18n="shipping_free_title">Envío Gratis</span>
                        <span class="sic__badge" data-i18n="shipping_free_badge">GRATIS</span>
                    </div>

                    <!-- Capa 2: Beneficios — lista -->
                    <div class="sic__row">
                        <ul class="sic__list">
                            <li data-i18n="shipping_benefit_1">Seguimiento de paquetes en tiempo real</li>
                            <li data-i18n="shipping_benefit_2">Devolución abierta en cualquier momento</li>
                            <li data-i18n="shipping_benefit_3">Plazos de entrega garantizados</li>
                        </ul>
                    </div>

                    <!-- Capa 3: Urgencia — fecha dinámica -->
                    <div class="sic__row">
                        <svg class="sic__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span class="sic__text"><span data-i18n="shipping_delivery_in">Entrega en 4 días</span>&thinsp;:&thinsp;<strong id="dynamic-delivery-date" class="delivery-highlight"></strong></span>
                    </div>

                </div>

                <div class="cart-summary">
                    <div class="cs__inner">

                        <!-- Perks -->
                        <div class="cart-perks">
                            <span class="cp__item cp__item--discount" data-i18n="scb_perk_discount">30% descuento</span>
                            <span class="cp__item cp__item--gift" data-i18n="scb_perk_gift">1 regalo sorpresa</span>
                            <span class="cp__item cp__item--timer"><span data-i18n="scb_perk_ends">Termina en</span><span id="cart-perks-timer" class="cp__timer">15:00</span></span>
                        </div>

                        <!-- Cabecera -->
                        <div class="cs__header">
                            <h2 class="cs__title" data-i18n="cart_summary_title">Resumen del Pedido</h2>
                        </div>

                        <!-- Filas dinámicas (JS las rellena) -->
                        <div class="summary-body"></div>

                        <!-- Botón de pago -->
                        <div class="cs__footer">
                            <button class="cs__pay-btn checkout-btn" data-i18n="cart_checkout">PAGAR</button>
                        </div>

                    </div>
                </div>

                </div><!-- /.cart-sidebar -->
            </div>
        </div>
    </main>

    <div data-component="footer" data-base="" data-pages-base="pages/"></div>
    <div data-component="bottom-nav" data-base=""></div>

    <script src="components/footer.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/shipping-widget.js" defer></script>
    <script src="app.js" defer></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        (function () {
            var STORAGE_KEY = 'ecozox_urgency_expires';
            var DURATION_MS = 15 * 60 * 1000;
            var el = document.getElementById('cart-perks-timer');
            if (!el) return;
            function getExpiry() {
                var stored = localStorage.getItem(STORAGE_KEY);
                var now = Date.now();
                if (stored) { var exp = parseInt(stored, 10); if (exp > now) return exp; }
                var newExp = now + DURATION_MS;
                localStorage.setItem(STORAGE_KEY, newExp);
                return newExp;
            }
            var expiresAt = getExpiry();
            function tick() {
                var remaining = expiresAt - Date.now();
                if (remaining <= 0) { expiresAt = Date.now() + DURATION_MS; localStorage.setItem(STORAGE_KEY, expiresAt); remaining = DURATION_MS; }
                var total = Math.max(0, Math.ceil(remaining / 1000));
                el.textContent = String(Math.floor(total / 60)).padStart(2, '0') + ':' + String(total % 60).padStart(2, '0');
            }
            tick();
            setInterval(tick, 1000);
        })();
    });
    </script>
</body>
</html>
