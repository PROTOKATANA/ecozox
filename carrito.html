<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - EcoZox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="components/header.js" defer></script>
</head>
<body>

    <div data-component="header" data-base=""></div>

    <main class="cart-section">
        <div class="container">
            <h1 style="margin-bottom: 2rem;">Tu Carrito de Compra</h1>

            <div class="cart-layout">
                <div class="cart-items"></div>

                <div class="cart-summary">
                    <h2>Resumen del Pedido</h2>
                    <div class="summary-body" style="margin-top: 1.5rem;">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Envío</span>
                            <span>Gratis</span>
                        </div>
                        <div class="summary-row">
                            <span>Impuestos estimados</span>
                            <span>$0.00</span>
                        </div>
                        <div class="summary-total">
                            <span>Total</span>
                            <span>$0.00</span>
                        </div>
                    </div>
                    <button class="btn btn-primary checkout-btn" onclick="window.EcoToast('Iniciando proceso de pago...')">Proceder al pago</button>
                </div>
            </div>
        </div>
    </main>

    <div data-component="footer" data-base="" data-pages-base="pages/"></div>

    <script src="components/footer.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
